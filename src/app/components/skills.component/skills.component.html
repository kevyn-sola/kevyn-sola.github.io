<div class="marquee-section reveal">
  <div class="marquee-track fwd">
    @for (skill of skillsForward; track skill) {
      <span [class.hot]="skill.hot" class="marquee-item">{{ skill.name }}</span>
    }
    <!-- duplicate for seamless loop -->
    @for (skill of skillsForward; track skill) {
      <span [class.hot]="skill.hot" class="marquee-item">{{ skill.name }}</span>
    }
  </div>
  <div class="marquee-track rev">
    @for (skill of skillsReverse; track skill) {
      <span class="marquee-item">{{ skill.name }}</span>
    }
    <!-- duplicate for seamless loop -->
    @for (skill of skillsReverse; track skill) {
      <span class="marquee-item">{{ skill.name }}</span>
    }
  </div>
</div>
